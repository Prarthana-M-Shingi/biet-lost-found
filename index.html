<!DOCTYPE html>
<html>
<head>
    <title>BIET Lost & Found</title>
</head>

<body style="background-color:white; color:black; font-size:20pt; text-align:center;">

    <h1>BIET Lost & Found</h1>

    <form>
        <br>

        <!-- Upload Image -->
        <label>Upload item photo</label><br><br>
        <input type="file"><br><br>

        <!-- Dropdown -->
        <label>Select item type</label><br><br>
        <select>
            <option>Bottle</option>
            <option>ID_Card</option>
            <option>Calculator</option>
        </select><br><br>

        <!-- Phone Number -->
        <label>Your phone number</label><br><br>
        <input type="text"><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit"
        style="background-color:blue; color:white; font-size:20pt;">

    </form>

</body>
</html>
